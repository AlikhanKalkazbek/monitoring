apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    orgId: 1
    url: http://prometheus:9090
    isDefault: true
    editable: false
    basicAuth: false
    jsonData:
      httpMethod: GET

  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    orgId: 1
    url: http://tempo:3200
    isDefault: false
    editable: false
    basicAuth: false
    jsonData:
      httpMethod: GET
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: "-1m"
        spanEndTimeShift: "1m"
        # In customQuery mode, Grafana does NOT auto-append the trace id even
        # with filterByTraceID: true — we must embed the variable ourselves.
        # service_name=~".+" satisfies Loki's "no empty-compatible matcher" rule.
        filterByTraceID: false
        filterBySpanID: false
        customQuery: true
        query: '{service_name=~".+"} | trace_id="$${__trace.traceId}"'
      serviceMap:
        datasourceUid: prometheus

  - name: Loki
    type: loki
    uid: loki
    access: proxy
    orgId: 1
    url: http://loki:3100
    isDefault: false
    editable: false
    basicAuth: false
    jsonData:
      # Link from a log line's trace id to the trace in Tempo.
      # Two extractors: one for OTLP structured metadata (where MEL/OTel-exported
      # logs put the trace id), another for the `trace=<id>` text written by the
      # log4net PatternLayout converter on file-only logs.
      derivedFields:
        - name: TraceID
          matcherType: label
          matcherRegex: trace_id
          url: '$${__value.raw}'
          datasourceUid: tempo
          urlDisplayLabel: 'View trace'
        - name: TraceIDFromText
          matcherRegex: 'trace=([a-f0-9]{32})'
          url: '$${__value.raw}'
          datasourceUid: tempo
          urlDisplayLabel: 'View trace'
