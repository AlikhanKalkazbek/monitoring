auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 168h  # 7 days
  # Promote a small, BOUNDED set of resource attributes to stream labels.
  # NEVER promote high-cardinality fields like trace_id, span_id, user.id —
  # each unique value creates a new stream and will collapse Loki under load.
  # trace_id / span_id arrive as OTLP structured metadata and are queryable via
  # `| trace_id="..."` without being labels.
  otlp_config:
    resource_attributes:
      attributes_config:
        - action: index_label
          attributes:
            - deployment.environment
            - service.name
            - service.instance.id

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem

analytics:
  reporting_enabled: false
